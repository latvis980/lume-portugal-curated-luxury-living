name: db-deploy

# Applies pending Supabase migrations to the live project on every push to main.
# This is the only path that writes to production -- no dashboard edits, no
# manual db push from a developer machine.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-deploy.yml'

  # Allow manual re-run from the Actions tab if needed.
  workflow_dispatch:

concurrency:
  group: db-deploy
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pin a known-good version so we don't hit GitHub's "find latest
          # release" API rate limit on every run (that's what failed the
          # auto-deploy after the farmhouse-remap PR).
          version: 2.20.5

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref ryizbwtscuczqusoeuvc

      - name: Repair phantom migration history
        # The remote migration_history table still records versions 20260428 /
        # 20260429 from the pre-baseline schema. Those files were collapsed
        # into 20260101000000_baseline_dashboard_schema.sql and no longer
        # exist locally, so `db push` aborts with "Remote migration versions
        # not found in local migrations directory". Marking them reverted
        # clears the mismatch. Idempotent — safe to re-run.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration repair --status reverted 20260428 20260429

      - name: Apply pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        # --debug surfaces the actual SQL the CLI sends and the full server
        # response, which is what the CLI itself recommends when a migration
        # aborts ("Try rerunning the command with --debug to troubleshoot").
        run: supabase db push --include-all --debug
